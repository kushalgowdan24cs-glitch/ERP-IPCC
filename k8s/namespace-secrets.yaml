apiVersion: v1
kind: Namespace
metadata:
  name: proctorshield
  labels:
    name: proctorshield
    environment: production

---
# Secrets (Base64 encoded - generate with: echo -n 'your-secret' | base64)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: proctorshield
type: Opaque
stringData:
  url: "postgresql://admin:supersecretpassword@postgres.proctorshield.svc.cluster.local:5432/proctorshield"

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: proctorshield
type: Opaque
stringData:
  access-key: "admin"
  secret-key: "supersecretpassword"
  endpoint: "http://minio.proctorshield.svc.cluster.local:9000"

---
apiVersion: v1
kind: Secret
metadata:
  name: livekit-secret
  namespace: proctorshield
type: Opaque
stringData:
  api-key: "your-livekit-api-key"
  api-secret: "your-livekit-api-secret"
  ws-url: "wss://your-livekit-project.livekit.cloud"

---
apiVersion: v1
kind: Secret
metadata:
  name: erp-webhook-secret
  namespace: proctorshield
type: Opaque
stringData:
  java-erp-url: "https://java-erp.university.edu/api/v1/proctor/results"
  secret-key: "super_secure_java_python_handshake_key"
