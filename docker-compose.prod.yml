version: '3.8'

services:
  # 1. The Permanent Memory
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: proctorshield
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. The AI Queue
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # 3. The Video Vault
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # 4. The Brain (Your FastAPI Server)
  backend:
    build: ./backend  # Assumes you have a Dockerfile in your backend folder
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - ./backend/.env
    # We don't expose port 8000 to the public. Nginx handles it.

  # 5. The Shield (Nginx Reverse Proxy)
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # For SSL certificates later
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  minio_data:
