events {
    worker_connections 1024;
}

http {
    upstream fastapi_backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name api.proctorshield.yourdomain.com; # Change to your actual domain

        # Route standard API traffic
        location /api/ {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # CRITICAL: Route WebSocket traffic for real-time Admin UI & signaling
        location /ws/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400; # Keep websockets alive
        }
    }
}
