<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProctorShield | Live Command Center</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; }
        .header { background: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; border-bottom: 1px solid #334155; }
        .header h1 { margin: 0; font-size: 1.5rem; color: #38bdf8; }
        .dashboard-container { display: flex; height: calc(100vh - 65px); }
        .grid-view { flex: 3; padding: 2rem; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .alert-sidebar { flex: 1; background: #1e293b; border-left: 1px solid #334155; padding: 1.5rem; overflow-y: auto; }
        
        /* Student Cards */
        .student-card { background: #334155; border-radius: 8px; padding: 1rem; position: relative; border-top: 4px solid #10b981; transition: 0.3s; }
        .student-card.yellow { border-top-color: #f59e0b; }
        .student-card.red { border-top-color: #ef4444; animation: pulse-red 2s infinite; }
        .student-card h3 { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
        .student-card .status { font-size: 0.85rem; color: #94a3b8; }
        
        /* Alert Feed */
        .alert-item { background: #0f172a; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; border-left: 3px solid #f59e0b; }
        .alert-item.CRITICAL { border-left-color: #ef4444; }
        .alert-time { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem;}
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ProctorShield Enterprise</h1>
        <div>Live Connections: <span id="connection-status" style="color: #10b981;">Online</span></div>
    </div>
    
    <div class="dashboard-container">
        <div class="grid-view" id="student-grid">
            </div>
        
        <div class="alert-sidebar">
            <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">Live AI Alerts</h2>
            <div id="alert-feed">
                <p style="color: #64748b; font-size: 0.9rem;">Waiting for anomalies...</p>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
