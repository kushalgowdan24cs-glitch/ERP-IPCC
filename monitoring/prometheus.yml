global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8000']

  - job_name: 'livekit'
    metrics_path: /metrics
    static_configs:
      - targets: ['livekit:7880']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']